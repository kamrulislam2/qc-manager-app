name: "Build & Release Tauri Desktop App"

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
          - platform: 'windows-latest'
            target: 'i686-pc-windows-msvc'
          # - platform: 'macos-latest'
          #   target: 'x86_64-apple-darwin'
          # - platform: 'macos-latest'
          #   target: 'aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend static assets
        run: npm run build:tauri
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

      - name: Run key verification diagnostics
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_PASS: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: python verify_key.py

      - name: Prepare signing key and password
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_PASS: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: python prepare_key.py

      - name: Verify signing key and password work
        shell: bash
        run: |
          echo "=== ENV VARIABLES ==="
          env | grep TAURI || true
          echo "=== SIGNING.KEY PROPERTIES ==="
          wc -l signing.key || true
          wc -c signing.key || true
          echo "Test content" > mock.txt
          npx tauri signer sign -f signing.key -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" mock.txt
          rm mock.txt

      - name: Build desktop application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        with:
          tagName: v__VERSION__
          releaseName: "QC App v__VERSION__"
          releaseBody: |
            ### QC App v__VERSION__ 🚀

            Welcome to the first official **1.0.0** release of the unified **QC App** (formerly Chuti tracker)! This version integrates our role-based Leave Tracker and Quotes Manager workspaces into a single premium desktop utility.

            #### 🌟 What's New in v__VERSION__:
            - **Unified Dual-Workspace Architecture**: Seamlessly switch between the **Leave Tracker (Chuti)** and **Quotes Manager** workspaces with fully independent access controls and permissions.
            - **Modern Inline User Configuration**: Replaced old add-user modals with a clean, inline settings panel (`StaffSettingsForm`) for editing or adding new staff accounts with uniform styling and alignment.
            - **Circular Inputs & Smooth Transitions**: Custom checkboxes inside lists and permissions panels are now styled as clean circles, accompanied by smooth sliding transition animations for access toggles.
            - **Resilient Password Setup Workflows**: Enforced automated credentials modal when users log in with the default password `1234`, locking workspace views until they configure their own secure credentials.
            - **System-Wide Fixes**: Cleaned up layout spacing inside supervisor checklists and disabled dev mode console clutter from update checking.
            - **Robust Data Protection**: Implemented cascade deletion routines to safely remove all associated attendance logs, settlements, and preferences when deleting a staff profile.

            #### 📦 Installation Instructions:
            - **Windows (64-bit)**: Download the `x86_64` `.exe` installer or `.msi` package, run it, and follow the setup wizard.
            - **Windows (32-bit)**: Download the `i686` `.exe` installer or `.msi` package for legacy 32-bit architectures.
            - **macOS (Intel)**: Download the `x86_64` `.dmg` and drag to your Applications folder.
            - **macOS (Apple Silicon)**: Download the `aarch64` `.dmg` (M1/M2/M3/M4/M5) and drag to your Applications folder.

            *Developed by Kamrul Islam, IT Officer, B&F Corporate.*
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
